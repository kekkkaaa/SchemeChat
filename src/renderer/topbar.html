<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>SchemeChat Top Bar</title>
  <link rel="stylesheet" href="topbar.css" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-fill"></div>
    <div class="topbar-actions">
      <button
        id="codexHelpBtn"
        class="topbar-btn topbar-icon-btn"
        type="button"
        aria-label="Codex 接入帮助"
        title="Codex 接入帮助"
      >?</button>
      <button id="discussionConsoleBtn" class="topbar-btn" type="button">&#24037;&#20316;&#21488;</button>
      <button id="settingsBtn" class="topbar-btn settings-btn" type="button">Setting</button>
    </div>
  </div>
  <script src="topbar.js"></script>
</body>
</html>
